<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>texwatch</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "@codemirror/state": "https://esm.sh/@codemirror/state",
            "@codemirror/view": "https://esm.sh/@codemirror/view?external=@codemirror/state",
            "@codemirror/language": "https://esm.sh/@codemirror/language?external=@codemirror/state,@codemirror/view",
            "codemirror": "https://esm.sh/codemirror?external=@codemirror/state,@codemirror/view,@codemirror/language",
            "@codemirror/legacy-modes/mode/stex": "https://esm.sh/@codemirror/legacy-modes/mode/stex?external=@codemirror/language",
            "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark?external=@codemirror/state,@codemirror/view,@codemirror/language"
        }
    }
    </script>
</head>
<body>
    <header>
        <div class="header-left">
            <a id="back-link" href="/" class="back-link" style="display:none" title="Back to dashboard">&#x2190;</a>
            <h1>texwatch: <span id="filename">loading...</span></h1>
        </div>
        <div class="header-right">
            <span id="status-indicator" class="status watching">Watching</span>
            <div class="zoom-controls">
                <button id="btn-zoom-out" title="Zoom out">&#x2212;</button>
                <span id="zoom-level">150%</span>
                <button id="btn-zoom-in" title="Zoom in">&#x2b;</button>
                <select id="zoom-select" title="Zoom preset">
                    <option value="fit-width">Fit width</option>
                    <option value="fit-page">Fit page</option>
                    <option value="0.75">75%</option>
                    <option value="1.0">100%</option>
                    <option value="1.5" selected>150%</option>
                    <option value="2.0">200%</option>
                </select>
            </div>
            <button id="btn-scroll-mode" title="Toggle continuous scroll">&#x2195;</button>
            <button id="btn-refresh" title="Force recompile">&#x21bb;</button>
            <button id="btn-settings" title="Settings">&#x2699;</button>
        </div>
    </header>

    <main>
        <div id="file-tree-pane">
            <div id="tree-header">
                <span>Files</span>
                <button id="btn-toggle-tree" title="Toggle file tree">&#x25c0;</button>
            </div>
            <div id="tree-container"></div>
        </div>
        <div id="tree-handle"></div>
        <div id="editor-pane">
            <div id="editor-header">
                <span id="editor-filename">loading...</span>
                <div class="editor-header-right">
                    <button id="btn-word-wrap" title="Toggle word wrap">&#x21A9;</button>
                    <span id="editor-status"></span>
                </div>
            </div>
            <div id="conflict-bar" class="hidden">
                <span>File changed on disk.</span>
                <button id="btn-reload">Reload</button>
                <button id="btn-keep">Keep mine</button>
            </div>
            <div id="editor-container"></div>
        </div>
        <div id="split-handle"></div>
        <div id="viewer-pane">
            <div id="pdf-container">
                <canvas id="pdf-canvas"></canvas>
                <div id="text-layer" class="textLayer"></div>
                <div id="pdf-highlight"></div>
            </div>
            <div id="markdown-preview" class="hidden"></div>
        </div>
    </main>

    <footer>
        <div id="error-panel" class="collapsed">
            <div id="error-header">
                <span id="error-summary">No issues</span>
                <div class="error-header-buttons">
                    <button id="btn-show-log" title="Show compilation log">Log</button>
                    <button id="btn-toggle-errors">&#x25bc;</button>
                </div>
            </div>
            <div id="error-list"></div>
            <div id="todo-list"></div>
            <div id="log-viewer" class="hidden">
                <pre id="log-content"></pre>
            </div>
        </div>
        <div id="status-bar">
            <span id="page-info">Page 1/1</span>
            <span id="line-info"></span>
            <span id="compile-info">Ready</span>
        </div>
    </footer>

    <script src="/static/filetree.js"></script>
    <script src="/static/viewer.js"></script>
    <script type="module" src="/static/editor.js"></script>
</body>
</html>
