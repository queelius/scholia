<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>texwatch dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Override viewer-oriented body/main styles from style.css */
        body { height: auto; overflow: auto; }
        main { overflow: visible; }

        .dashboard { padding: 2em; max-width: 1200px; margin: 0 auto; }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.5em;
        }
        .dashboard-header h2 {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-secondary);
        }
        .project-count {
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            padding: 2px 10px;
            border-radius: 10px;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 12px;
        }

        .project-card {
            display: flex;
            flex-direction: column;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 6px;
            border-left: 3px solid var(--text-secondary);
            text-decoration: none;
            color: inherit;
            transition: background 0.15s, border-color 0.15s;
        }
        .project-card:hover { background: var(--bg-tertiary); }
        .project-card.status-ok    { border-left-color: var(--success); }
        .project-card.status-err   { border-left-color: var(--error); }
        .project-card.status-compiling { border-left-color: var(--warning); }
        .project-card.status-pending   { border-left-color: var(--text-secondary); }

        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .card-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--accent);
        }
        .card-compiler {
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 3px;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .card-body {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            line-height: 1.5;
        }
        .card-main {
            color: var(--text-primary);
        }
        .card-path {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            opacity: 0.7;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }
        .card-status {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .card-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            background: var(--text-secondary);
        }
        .status-ok .card-status::before    { background: var(--success); }
        .status-err .card-status::before   { background: var(--error); }
        .status-compiling .card-status::before {
            background: var(--warning);
            animation: pulse 1s infinite;
        }
        .card-status-text.ok       { color: var(--success); }
        .card-status-text.err      { color: var(--error); }
        .card-status-text.compiling { color: var(--warning); }
        .card-status-text.pending  { color: var(--text-secondary); }

        .card-time {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .empty-state {
            text-align: center;
            padding: 3em;
            color: var(--text-secondary);
        }

        .search-bar {
            margin-bottom: 1em;
        }
        #search-input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 12px;
            font-size: 14px;
            font-family: inherit;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 6px;
            outline: none;
        }
        #search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }
        #search-input::placeholder {
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <h1>texwatch <span class="header-subtitle" style="color: var(--text-secondary); font-weight: 400;">dashboard</span></h1>
        </div>
        <div class="header-right">
            <span id="project-count" class="project-count"></span>
        </div>
    </header>
    <main class="dashboard">
        <div class="search-bar">
            <input id="search-input" type="text" placeholder="Filter projects…" autocomplete="off">
        </div>
        <div id="project-list-container">Loading projects...</div>
    </main>
    <script>
    (function() {
        const container = document.getElementById('project-list-container');
        const countBadge = document.getElementById('project-count');
        const searchInput = document.getElementById('search-input');
        let currentProjects = [];
        let filterTerm = '';

        function formatTimeAgo(isoString) {
            if (!isoString) return '';
            const seconds = Math.floor((Date.now() - new Date(isoString).getTime()) / 1000);
            if (seconds < 5) return 'just now';
            if (seconds < 60) return seconds + 's ago';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
            if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
            return Math.floor(seconds / 86400) + 'd ago';
        }

        function statusClass(p) {
            if (p.compiling) return 'compiling';
            if (p.success === true) return 'ok';
            if (p.success === false) return 'err';
            return 'pending';
        }

        function statusText(p) {
            if (p.compiling) return 'compiling';
            if (p.success === true) {
                if (p.warning_count > 0) return p.warning_count + ' warning' + (p.warning_count !== 1 ? 's' : '');
                return 'ok';
            }
            if (p.success === false) return p.error_count + ' error' + (p.error_count !== 1 ? 's' : '');
            return 'not compiled';
        }

        function matchesFilter(p) {
            if (!filterTerm) return true;
            const term = filterTerm.toLowerCase();
            return p.name.toLowerCase().includes(term)
                || p.main.toLowerCase().includes(term)
                || p.path.toLowerCase().includes(term)
                || p.compiler.toLowerCase().includes(term)
                || statusText(p).toLowerCase().includes(term);
        }

        function renderCards(projects) {
            const total = projects.length;
            const visible = projects.filter(matchesFilter);

            if (total === 0) {
                container.innerHTML = '<div class="empty-state">No projects registered.</div>';
                countBadge.textContent = '0 projects';
                return;
            }

            if (visible.length === 0) {
                container.innerHTML = '<div class="empty-state">No matching projects.</div>';
                countBadge.textContent = '0 / ' + total + ' projects';
                return;
            }

            if (filterTerm) {
                countBadge.textContent = visible.length + ' / ' + total + ' project' + (total !== 1 ? 's' : '');
            } else {
                countBadge.textContent = total + ' project' + (total !== 1 ? 's' : '');
            }

            let html = '<div class="project-grid">';
            for (const p of visible) {
                const sc = statusClass(p);
                const st = statusText(p);
                const timeAgo = formatTimeAgo(p.last_compile);
                html += '<a href="/p/' + encodeURIComponent(p.name) + '/" class="project-card status-' + sc + '" data-project="' + p.name + '">'
                    + '<div class="card-header">'
                    +   '<span class="card-name">' + p.name + '</span>'
                    +   '<span class="card-compiler">' + p.compiler + '</span>'
                    + '</div>'
                    + '<div class="card-body">'
                    +   '<div class="card-main">' + p.main + '</div>'
                    +   '<div class="card-path" title="' + p.path + '">' + p.path + '</div>'
                    + '</div>'
                    + '<div class="card-footer">'
                    +   '<span class="card-status"><span class="card-status-text ' + sc + '">' + st + '</span></span>'
                    +   '<span class="card-time" data-time-project="' + p.name + '">' + timeAgo + '</span>'
                    + '</div>'
                    + '</a>';
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function updateInPlace(projects) {
            for (const p of projects) {
                const card = container.querySelector('[data-project="' + p.name + '"]');
                if (!card) { renderCards(projects); return; }

                const sc = statusClass(p);
                const st = statusText(p);
                const timeAgo = formatTimeAgo(p.last_compile);

                // Apply filter visibility
                card.style.display = matchesFilter(p) ? '' : 'none';

                // Update status class on card
                card.className = 'project-card status-' + sc;

                // Update status text
                const statusSpan = card.querySelector('.card-status-text');
                if (statusSpan) {
                    statusSpan.className = 'card-status-text ' + sc;
                    statusSpan.textContent = st;
                }

                // Update time
                const timeSpan = card.querySelector('[data-time-project="' + p.name + '"]');
                if (timeSpan) timeSpan.textContent = timeAgo;
            }

            // Update count badge to reflect filter
            const total = projects.length;
            const visibleCount = projects.filter(matchesFilter).length;
            if (filterTerm) {
                countBadge.textContent = visibleCount + ' / ' + total + ' project' + (total !== 1 ? 's' : '');
            } else {
                countBadge.textContent = total + ' project' + (total !== 1 ? 's' : '');
            }
        }

        async function fetchProjects() {
            const resp = await fetch('/projects');
            const data = await resp.json();
            return data.projects || [];
        }

        // Search filtering
        searchInput.addEventListener('input', function() {
            filterTerm = searchInput.value;
            renderCards(currentProjects);
        });

        // Focus search on '/' key (GitHub/Slack convention)
        document.addEventListener('keydown', function(e) {
            if (e.key === '/' && document.activeElement !== searchInput) {
                e.preventDefault();
                searchInput.focus();
            }
        });

        // Initial load
        fetchProjects().then(function(projects) {
            currentProjects = projects;
            renderCards(projects);
        }).catch(function(err) {
            container.textContent = 'Failed to load projects: ' + err.message;
        });

        // Auto-refresh every 5s
        setInterval(function() {
            fetchProjects().then(function(projects) {
                if (projects.length !== currentProjects.length) {
                    currentProjects = projects;
                    renderCards(projects);
                } else {
                    currentProjects = projects;
                    updateInPlace(projects);
                }
            }).catch(function() {});  // silently ignore refresh errors
        }, 5000);
    })();
    </script>
</body>
</html>
